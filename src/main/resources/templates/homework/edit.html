<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Homework - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
            --amber: #d97706;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 80px 20px 40px;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .form-card {
            border: none;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            max-width: 750px;
            margin: 0 auto;
            background: white;
        }

        .form-header {
            background: linear-gradient(135deg, var(--emerald-dark) 0%, var(--slate-900) 100%);
            padding: 2.5rem;
            text-align: center;
            color: white;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-900);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid var(--slate-200);
            background-color: #fcfcfd;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--emerald);
            box-shadow: 0 0 0 4px var(--emerald-light);
            background-color: white;
        }

        .current-file-box {
            background-color: #f1f5f9;
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            border: 1px solid var(--slate-200);
            margin-bottom: 1rem;
        }

        .drop-zone {
            border: 2px dashed var(--slate-200);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fbfcfe;
        }

        .drop-zone:hover {
            border-color: var(--amber);
            background: #fffbeb;
        }

        .btn-update {
            background-color: var(--emerald);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-update:hover {
            background-color: var(--emerald-dark);
            transform: translateY(-2px);
        }

        .input-group-text {
            background-color: #f1f5f9;
            border-radius: 12px 0 0 12px !important;
            border: 1px solid var(--slate-200);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link fw-bold text-emerald" th:href="@{/homework/classroom/{id}(id=${classroomId})}">
                <i class="fas fa-times me-1"></i> Discard Changes
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <div class="form-header">
            <div class="d-inline-flex align-items-center justify-content-center bg-white rounded-circle mb-3 shadow" style="width: 70px; height: 70px;">
                <i class="fas fa-edit text-warning" style="font-size: 1.8rem;"></i>
            </div>
            <h2 class="fw-bold mb-1">Edit Assignment</h2>
            <p class="mb-0 opacity-75">Modifying: <span class="fw-bold" th:text="${homework.title}">Assignment Title</span></p>
        </div>

        <div class="card-body p-4 p-md-5">
            <form th:action="@{/homework/{id}/edit(id=${homework.id})}" method="post" enctype="multipart/form-data" id="editHomeworkForm">
                
                <div class="mb-4">
                    <label for="title" class="form-label">Assignment Title</label>
                    <input type="text" class="form-control" id="title" name="title" th:value="${homework.title}" required>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">Instructions / Description</label>
                    <textarea class="form-control" id="description" name="description" rows="6" 
                              th:text="${homework.description}" placeholder="Update assignment details..."></textarea>
                </div>

                <div class="mb-4">
                    <label for="dueDate" class="form-label">New Due Date</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-calendar-check text-emerald"></i></span>
                        <input type="datetime-local" class="form-control" id="dueDate" name="dueDate" 
                               th:value="${homework.dueDate}">
                    </div>
                    <small class="text-muted mt-2 d-block">Current deadline set for this task.</small>
                </div>

                <div class="mb-5">
                    <label class="form-label">Assignment Attachment</label>
                    
                    <div th:if="${homework.fileName != null}" class="current-file-box">
                        <i class="fas fa-file-alt me-3 text-emerald fa-lg"></i>
                        <div class="flex-grow-1">
                            <span class="small d-block text-muted">Active File:</span>
                            <strong class="text-slate-900" th:text="${homework.fileName}">document.pdf</strong>
                        </div>
                        <span class="badge bg-success">Stored</span>
                    </div>

                    <div class="drop-zone" id="dropZone">
                        <i class="fas fa-sync-alt mb-2 text-muted"></i>
                        <h6 class="fw-bold text-slate-900 mb-0">Replace file or drag new one</h6>
                        <p class="text-muted small mb-0">Leave empty to keep the current attachment</p>
                        <input type="file" id="fileInput" name="file" accept=".pdf,.txt,.doc,.docx" hidden>
                    </div>
                    <div id="filePreview" class="mt-3"></div>
                </div>

                <div class="row g-3">
                    <div class="col-md-8">
                        <button type="submit" class="btn btn-update w-100 shadow-sm">
                            <i class="fas fa-check-circle me-2"></i>Save Changes
                        </button>
                    </div>
                    <div class="col-md-4">
                        <a th:href="@{/homework/classroom/{id}(id=${classroomId})}" class="btn btn-light w-100 border py-3 fw-bold rounded-3">
                            Cancel
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');

    dropZone.addEventListener('click', () => fileInput.click());

    ['dragover', 'dragleave', 'drop'].forEach(evt => {
        dropZone.addEventListener(evt, e => e.preventDefault());
    });

    dropZone.addEventListener('drop', (e) => {
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            handleFile(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
        filePreview.innerHTML = `
            <div class="p-3 border rounded-3 bg-amber-light d-flex justify-content-between align-items-center border-warning">
                <span class="small fw-bold text-amber"><i class="fas fa-file-upload me-2"></i>New Replacement: ${file.name}</span>
                <button type="button" class="btn btn-sm btn-outline-danger border-0" onclick="clearFile()"><i class="fas fa-times"></i></button>
            </div>`;
    }

    function clearFile() {
        fileInput.value = '';
        filePreview.innerHTML = '';
    }
</script>

</body>
</html>
