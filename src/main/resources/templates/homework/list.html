<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${classroom.name} + ' - Assignments'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-600: #475569;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 80px;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .page-header {
            background: white;
            padding: 2rem 0;
            border-bottom: 1px solid var(--slate-200);
            margin-bottom: 3rem;
        }

        .homework-card {
            border: 1px solid var(--slate-200);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .homework-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--emerald-light);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--emerald-light);
            color: var(--emerald);
            font-size: 1.2rem;
        }

        .status-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 700;
        }

        .btn-action {
            border-radius: 10px;
            padding: 8px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-primary-custom {
            background-color: var(--emerald);
            color: white;
            border: none;
        }

        .btn-primary-custom:hover {
            background-color: var(--emerald-dark);
            color: white;
        }

        .empty-state-icon {
            background: var(--slate-200);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--slate-600);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            <i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE
        </a>
        <div class="ms-auto">
            <a class="btn btn-outline-secondary btn-sm rounded-pill px-3" th:href="@{/classroom/{id}(id=${classroom.id})}">
                <i class="fas fa-arrow-left me-1"></i> Classroom
            </a>
        </div>
    </div>
</nav>

<header class="page-header">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item small"><a href="/dashboard" class="text-decoration-none">LMS</a></li>
                        <li class="breadcrumb-item small active" th:text="${classroom.name}">Classroom</li>
                    </ol>
                </nav>
                <h2 class="fw-bold text-slate-900 mb-0">Classroom Assignments</h2>
            </div>
            <div class="mt-3 mt-md-0" th:if="${user.role.name() == 'TEACHER'}">
                <a th:href="@{/homework/create/{classroomId}(classroomId=${classroom.id})}" class="btn btn-primary-custom px-4 py-2 rounded-3 shadow-sm">
                    <i class="fas fa-plus-circle me-2"></i>Create New Assignment
                </a>
            </div>
        </div>
    </div>
</header>

<div class="container mb-5">
    <div th:if="${message}" class="alert alert-success border-0 shadow-sm rounded-3 mb-4" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${message}"></span>
    </div>

    <div th:if="${homeworks.isEmpty()}" class="text-center py-5">
        <div class="empty-state-icon">
            <i class="fas fa-folder-open fa-3x"></i>
        </div>
        <h3 class="fw-bold text-slate-900">No Assignments Yet</h3>
        <p class="text-muted mb-4">When a teacher posts homework, it will appear here.</p>
        <a th:if="${user.role.name() == 'TEACHER'}" th:href="@{/homework/create/{classroomId}(classroomId=${classroom.id})}" class="btn btn-primary-custom">
            Assign First Homework
        </a>
    </div>

    <div class="row g-4">
        <div th:each="homework : ${homeworks}" class="col-md-6 col-lg-4">
            <div class="card homework-card p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="icon-box">
                        <i class="fas fa-book-reader"></i>
                    </div>
                    <span class="status-badge bg-success-soft text-success border border-success" 
                          style="background: #f0fdf4;">Active</span>
                </div>

                <h5 class="fw-bold text-slate-900 mb-1" th:text="${homework.title}">Assignment Title</h5>
                
                <div class="d-flex align-items-center mb-3 text-muted small">
                    <i class="fas fa-calendar-alt me-2"></i>
                    <span>Due: </span>
                    <span class="ms-1 fw-bold text-slate-700" th:text="${#temporals.format(homework.dueDate, 'MMM dd, HH:mm')}">Date</span>
                </div>

                <p class="text-slate-600 small mb-4 flex-grow-1">
                    <span th:text="${#strings.abbreviate(homework.description, 85)}">Description text goes here...</span>
                </p>

                <div class="pt-3 border-top mt-auto" th:if="${user.role.name() == 'TEACHER'}">
                    <div class="d-flex justify-content-end">
                         <a th:href="@{/homework/{id}/edit(id=${homework.id})}" class="btn btn-light btn-action text-emerald" title="Edit Assignment">
                             <i class="fas fa-edit me-1"></i> Edit
                         </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
