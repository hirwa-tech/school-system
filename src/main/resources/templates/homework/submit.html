<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Assignment - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
            --ruby: #991b1b;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 100px 20px 40px;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .submit-card {
            border: none;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            max-width: 650px;
            margin: 0 auto;
            background: white;
        }

        .submit-header {
            background: linear-gradient(135deg, var(--emerald-dark) 0%, var(--slate-900) 100%);
            padding: 3rem 2rem;
            text-align: center;
            color: white;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-900);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid var(--slate-200);
            background-color: #fcfcfd;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--emerald);
            box-shadow: 0 0 0 4px var(--emerald-light);
            background-color: white;
        }

        .input-group-text {
            background-color: #f1f5f9;
            border: 1px solid var(--slate-200);
            border-radius: 12px 0 0 12px !important;
            color: var(--slate-700);
        }

        .btn-submit {
            background-color: var(--emerald);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--emerald-dark);
            transform: translateY(-2px);
            color: white;
        }

        .btn-cancel {
            background-color: #f1f5f9;
            color: var(--slate-700);
            border: 1px solid var(--slate-200);
            border-radius: 12px;
            padding: 16px 32px;
            font-weight: 700;
            transition: all 0.2s;
        }
        
        .btn-cancel:hover { background-color: var(--slate-200); }

        .upload-hint {
            font-size: 0.8rem;
            color: var(--slate-600);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-dark fw-bold" href="/logout"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="submit-card">
        <div class="submit-header">
            <div class="d-inline-flex align-items-center justify-content-center bg-white rounded-circle mb-3 shadow" style="width: 60px; height: 60px;">
                <i class="fas fa-file-upload text-emerald" style="font-size: 1.5rem;"></i>
            </div>
            <h2 class="fw-bold mb-1">Turn In Assignment</h2>
            <p class="mb-0 opacity-75">Submit your work for review</p>
        </div>

        <div class="card-body p-4 p-md-5">
            <form th:action="@{/homework/{id}/submit(id=${homeworkId})}" method="post" enctype="multipart/form-data" id="submissionForm">
                
                <div th:if="${error}" class="alert alert-danger border-0 rounded-3 mb-4" th:text="${error}"></div>
                <div th:if="${message}" class="alert alert-success border-0 rounded-3 mb-4" th:text="${message}"></div>

                <div class="mb-4">
                    <label for="submissionText" class="form-label">Notes for Teacher</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-comment-alt"></i></span>
                        <textarea class="form-control" id="submissionText" name="submissionText" rows="4" 
                                  placeholder="Provide any additional context or answer text-only questions here..."></textarea>
                    </div>
                </div>

                <div class="mb-5">
                    <label for="file" class="form-label">Supporting Document</label>
                    <div class="position-relative">
                        <input type="file" class="form-control" id="file" name="file" 
                               accept=".pdf,.txt,.doc,.docx" onchange="validateFile(this)">
                        <div class="upload-hint">
                            <i class="fas fa-info-circle me-1"></i> Accepted formats: PDF, DOCX, TXT (Max 30MB)
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-8">
                        <button type="submit" class="btn btn-submit w-100 shadow-sm">
                            <i class="fas fa-paper-plane me-2"></i>Hand In Work
                        </button>
                    </div>
                    <div class="col-md-4">
                        <a href="javascript:history.back()" class="btn btn-cancel w-100 text-decoration-none text-center">
                            Cancel
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function validateFile(input) {
        const filePath = input.value;
        const allowedExtensions = /(\.pdf|\.doc|\.docx|\.txt)$/i;
        
        if (filePath && !allowedExtensions.exec(filePath)) {
            alert('Invalid file type. Please upload a PDF, Word document, or Text file.');
            input.value = '';
            return false;
        }
        
        // Check size (10MB limit)
        if (input.files[0].size > 10 * 1024 * 1024) {
            alert('File is too large. Please keep it under 10MB.');
            input.value = '';
            return false;
        }
    }
</script>

</body>
</html>
