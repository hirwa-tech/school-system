<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Teacher - G.S. GIHUNDWE Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 80px;
        }

        .navbar-custom {
            background-color: var(--slate-900);
            border-bottom: 1px solid var(--emerald);
        }

        .admin-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            overflow: hidden;
            background: white;
        }

        .card-header-admin {
            background: linear-gradient(135deg, var(--slate-900) 0%, var(--emerald-dark) 100%);
            padding: 2rem;
            color: white;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-700);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid var(--slate-200);
            background-color: #fcfcfd;
        }

        .form-control:focus {
            border-color: var(--emerald);
            box-shadow: 0 0 0 4px var(--emerald-light);
        }

        .form-control[readonly] {
            background-color: #f1f5f9;
            cursor: not-allowed;
            color: var(--slate-700);
        }

        .btn-update {
            background-color: var(--emerald);
            border: none;
            color: white;
            padding: 12px 25px;
            font-weight: 700;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .btn-update:hover {
            background-color: var(--emerald-dark);
            transform: translateY(-2px);
            color: white;
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            background: var(--emerald-light);
            color: var(--emerald);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard"><i class="fas fa-shield-alt me-2"></i>ADMIN PANEL</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link fw-bold" href="/dashboard/teachers">
                <i class="fas fa-arrow-left me-1"></i> Back to Teachers
            </a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="admin-card">
                <div class="card-header-admin text-center">
                    <div class="avatar-preview mx-auto">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Edit Teacher Profile</h3>
                    <p class="mb-0 opacity-75 small">Update account details for <span class="fw-bold" th:text="${teacher.username}">User</span></p>
                </div>

                <div class="card-body p-4 p-md-5">
                    <div th:if="${success}" class="alert alert-success border-0 shadow-sm rounded-3">
                        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                    </div>
                    <div th:if="${error}" class="alert alert-danger border-0 shadow-sm rounded-3">
                        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                    </div>

                    <form th:action="@{'/users/' + ${teacher.id}}" th:object="${teacher}" method="post">
                        <input type="hidden" name="_method" th:value="'PUT'">
                        
                        <div class="row g-4">
                            <div class="col-12">
                                <label class="form-label">Username (System ID)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="text" class="form-control" th:value="*{username}" name="username" readonly>
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Primary Email Address</label>
                                <input type="email" class="form-control" th:field="*{email}" required placeholder="email@gihundwe.rw">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" th:field="*{firstName}" placeholder="First Name">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" th:field="*{lastName}" placeholder="Last Name">
                            </div>

                            <div class="col-12">
                                <hr class="my-4 text-slate-200">
                                <h6 class="fw-bold text-slate-900 mb-3"><i class="fas fa-key me-2 text-warning"></i>Security Credentials</h6>
                                <label class="form-label">Reset Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Enter new password to reset">
                                <small class="text-muted mt-2 d-block">Leave blank if the teacher wishes to keep their current password.</small>
                            </div>

                            <div class="col-12 mt-5 text-center">
                                <button type="submit" class="btn btn-update px-5 shadow-sm">
                                    <i class="fas fa-save me-2"></i>Commit Changes
                                </button>
                                <a th:href="@{/dashboard/teachers}" class="btn btn-link text-muted fw-bold text-decoration-none ms-3">
                                    Discard Changes
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
