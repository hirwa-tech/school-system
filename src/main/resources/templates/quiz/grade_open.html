<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluate Submission - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 80px;
            padding-bottom: 50px;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .mgmt-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem;
            color: white;
            border-radius: 20px 20px 0 0;
        }

        .evaluation-card {
            background: white;
            border: 1px solid var(--slate-200);
            border-radius: 16px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .q-header {
            background-color: var(--slate-900);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .student-answer-box {
            background-color: var(--emerald-light);
            border-left: 4px solid var(--emerald);
            padding: 1.5rem;
            margin: 1rem 0;
            border-radius: 0 8px 8px 0;
            color: var(--slate-900);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-700);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .total-score-card {
            background: white;
            border: 2px solid var(--emerald);
            border-radius: 16px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .score-input {
            font-weight: 800;
            font-size: 1.25rem;
            border: 2px solid var(--slate-200);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto">
            <a class="btn btn-outline-danger btn-sm fw-bold rounded-pill px-3" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="mgmt-header shadow-sm">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center">
            <div>
                <h2 class="fw-bold mb-1"><i class="fas fa-pen-nib me-2"></i>Grading Session</h2>
                <p class="mb-0 opacity-80" th:text="${quiz.title}">Quiz Title</p>
            </div>
            <div class="text-md-end mt-3 mt-md-0">
                <span class="text-uppercase small fw-bold opacity-75 d-block">Student</span>
                <span class="fs-5 fw-bold" th:text="${attempt.student.firstName + ' ' + attempt.student.lastName}">Name</span>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <form th:action="@{/quiz/grade/{attemptId}(attemptId=${attempt.id})}" method="post">
            
            <div th:each="question, iterStat : ${questions}" class="evaluation-card">
                <div class="q-header">
                    <span class="fw-bold" th:text="'QUESTION ' + ${iterStat.index + 1}">QUESTION 1</span>
                    <span class="badge bg-emerald-light text-dark fw-bold" th:text="${question.type}">TYPE</span>
                </div>
                
                <div class="p-4">
                    <p class="lead fw-bold mb-3" th:text="${question.questionText}">Question text goes here...</p>
                    
                    <div class="student-answer-box shadow-sm">
                        <label class="form-label text-emerald d-block mb-2">Student's Response:</label>
                        <div th:text="${answers[question.id]}">Answer text</div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-4" th:if="${question.type.name() == 'OPEN_QUESTION'}">
                            <label th:for="${'score_' + question.id}" class="form-label">Award Points</label>
                            <div class="input-group">
                                <input type="number" class="form-control score-input" 
                                       th:id="${'score_' + question.id}" 
                                       th:name="${'score_' + question.id}" 
                                       min="0" th:max="${question.marks}" value="0" required>
                                <span class="input-group-text bg-white fw-bold">/ <span th:text="${question.marks}">1</span></span>
                            </div>
                        </div>
                        
                        <div th:class="${question.type.name() == 'OPEN_QUESTION' ? 'col-md-8' : 'col-12'}">
                            <label th:for="${'feedback_' + question.id}" class="form-label">Feedback for Student</label>
                            <textarea class="form-control" th:id="${'feedback_' + question.id}" 
                                      th:name="${'feedback_' + question.id}" rows="2" 
                                      placeholder="Provide specific comments for this answer..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="total-score-card shadow">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h4 class="fw-bold mb-1 text-emerald">Final Assessment Result</h4>
                        <p class="text-muted mb-md-0">Calculate the final cumulative score for this attempt.</p>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-emerald text-white fw-bold">Total Score</span>
                            <input type="number" class="form-control score-input text-center" 
                                   id="totalScore" name="totalScore" min="0" max="100" step="0.1" 
                                   placeholder="0.0" required>
                            <span class="input-group-text bg-white fw-bold">%</span>
                        </div>
                    </div>
                    <div class="col-md-2 text-end">
                        <button type="submit" class="btn btn-emerald text-white fw-bold w-100 py-3 rounded-pill" style="background-color: var(--emerald);">
                            Submit
                        </button>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/quiz/{id}/attempts(id=${quiz.id})}" class="btn btn-link text-muted fw-bold text-decoration-none">
                    <i class="fas fa-times me-1"></i> Cancel Evaluation
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
