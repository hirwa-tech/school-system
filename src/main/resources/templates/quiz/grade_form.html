<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Quiz Attempt - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 80px;
            padding-bottom: 80px;
        }

        
        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

       
        .mgmt-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem;
            color: white;
            border-radius: 20px 20px 0 0;
        }

        .student-info-bar {
            background: white;
            border-bottom: 1px solid var(--slate-200);
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        
        .question-card {
            background: white;
            border: 1px solid var(--slate-200);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }
        
        .answer-box {
            background-color: #f1f5f9;
            border-left: 4px solid var(--slate-200);
            padding: 1rem;
            border-radius: 0 8px 8px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
        }

        .correct-answer-box {
            background-color: var(--emerald-light);
            border-left: 4px solid var(--emerald);
            padding: 0.75rem;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
            color: var(--emerald-dark);
            margin-top: 10px;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-700);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .score-input {
            width: 120px;
            font-weight: 800;
            font-size: 1.1rem;
            border: 2px solid var(--slate-200);
            text-align: center;
        }

        .score-input:focus { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(22, 101, 52, 0.1); }

        .btn-save {
            background-color: var(--emerald);
            color: white;
            border-radius: 12px;
            padding: 0.8rem 2.5rem;
            font-weight: 700;
            border: none;
        }
        .btn-save:hover { background-color: var(--emerald-dark); transform: translateY(-1px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link fw-bold text-emerald" th:href="@{/quiz/{id}/attempts(id=${quiz.id})}">
                <i class="fas fa-arrow-left me-1"></i> Back to Attempts
            </a>
            <a class="nav-link text-danger fw-bold" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm border-0 overflow-hidden" style="border-radius: 20px;">
        <div class="mgmt-header">
            <h2 class="fw-bold mb-1"><i class="fas fa-marker me-2"></i>Grade Submission</h2>
            <p class="mb-0 opacity-80" th:text="${quiz.title}">Quiz Title</p>
        </div>

        <div class="student-info-bar">
            <div>
                <span class="text-muted small text-uppercase fw-bold">Student</span>
                <div class="fw-bold fs-5 text-dark" th:text="${attempt.student.firstName + ' ' + attempt.student.lastName}">Name</div>
            </div>
            <div class="text-end">
                <span class="text-muted small text-uppercase fw-bold">Current Score</span>
                <div class="fw-bold fs-5 text-emerald">
                    <span th:text="${attempt.score != null ? #numbers.formatDecimal(attempt.score, 1, 1) : '0.0'}">0.0</span>
                    <span class="text-muted"> / <span th:text="${#numbers.formatDecimal(attempt.totalMarks, 1, 1)}">0.0</span></span>
                </div>
            </div>
        </div>

        <div class="card-body p-4 p-md-5">
            <form th:action="@{/quiz/{quizId}/attempt/{attemptId}/grade(quizId=${quiz.id},attemptId=${attempt.id})}" method="post">
                
                <div th:each="entry : ${questions}" class="question-card shadow-sm">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <h5 class="fw-bold text-slate-900 mb-0">
                            <span class="badge bg-dark me-2" th:text="'Q' + ${entry.key}">Q1</span>
                            <span th:text="${entry.value.questionText}">Question Text</span>
                        </h5>
                        <span class="badge bg-light text-dark border" th:text="${entry.value.type}">TYPE</span>
                    </div>

                    <div class="row g-4">
                        <div class="col-lg-7">
                            <label class="form-label">Student Answer</label>
                            <div class="answer-box">
                                <span th:if="${answers.get(entry.key) != null}" th:text="${answers.get(entry.key)}">Answer text</span>
                                <span th:if="${answers.get(entry.key) == null}" class="text-muted italic">No answer submitted</span>
                            </div>

                            <div class="mt-3">
                                <label class="form-label">Key/Correct Reference</label>
                                <div class="correct-answer-box" th:text="${entry.value.correctAnswer}">Correct Reference</div>
                            </div>
                        </div>

                        <div class="col-lg-5">
                            <div th:if="${entry.value.type != 'OPEN_QUESTION'}" class="alert alert-light border h-100 d-flex align-items-center mb-0">
                                <div>
                                    <i class="fas fa-robot text-primary me-2"></i>
                                    <span class="fw-bold">Auto-Graded Question</span>
                                    <p class="small text-muted mb-0 mt-1">System evaluated based on exact match.</p>
                                </div>
                            </div>

                            <div th:if="${entry.value.type == 'OPEN_QUESTION'}" class="p-3 bg-light rounded-3 h-100">
                                <div class="mb-3">
                                    <label th:for="${'score_' + entry.key}" class="form-label">Award Points</label>
                                    <div class="d-flex align-items-center gap-2">
                                        <input type="number" class="form-control score-input" 
                                               th:id="${'score_' + entry.key}" 
                                               th:name="${'score_' + entry.key}" 
                                               min="0" th:max="${entry.value.marks}" 
                                               step="0.1" value="0">
                                        <span class="fw-bold text-muted">/ <span th:text="${entry.value.marks}">1</span></span>
                                    </div>
                                </div>

                                <div>
                                    <label th:for="${'feedback_' + entry.key}" class="form-label">Teacher Feedback</label>
                                    <textarea class="form-control bg-white" 
                                              th:id="${'feedback_' + entry.key}" 
                                              th:name="${'feedback_' + entry.key}" 
                                              rows="2" 
                                              th:text="${feedbacks.get(entry.key)}"
                                              placeholder="Why was this mark given?"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5 d-flex gap-3">
                    <button type="submit" class="btn btn-save">
                        <i class="fas fa-check-circle me-2"></i>Finalize Grade
                    </button>
                    <a th:href="@{/quiz/{id}/attempts(id=${quiz.id})}" class="btn btn-light border px-4 rounded-pill fw-bold">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
