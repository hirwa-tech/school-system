<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Grading - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 80px;
            padding-bottom: 80px;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .mgmt-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem;
            color: white;
            border-radius: 20px;
            margin-bottom: 2rem;
        }

        
        .question-block {
            background: white;
            border: 1px solid var(--slate-200);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 3rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .question-title-bar {
            background-color: var(--slate-900);
            color: white;
            padding: 1.5rem 2rem;
        }

        
        .student-submission {
            border-bottom: 1px solid var(--slate-200);
            padding: 1.5rem 2rem;
            transition: background-color 0.2s;
        }
        .student-submission:last-child { border-bottom: none; }
        .student-submission:hover { background-color: #fbfeff; }

        .answer-text {
            background-color: #f1f5f9;
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid var(--emerald);
            font-size: 0.95rem;
            color: var(--slate-900);
            min-height: 60px;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-700);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .score-input {
            font-weight: 800;
            border: 2px solid var(--slate-200);
            border-radius: 10px;
        }
        .score-input:focus { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(22, 101, 52, 0.1); }

        .btn-save-all {
            background-color: var(--emerald);
            color: white;
            border-radius: 12px;
            padding: 1rem 3rem;
            font-weight: 800;
            border: none;
            box-shadow: 0 10px 15px -3px rgba(22, 101, 52, 0.3);
        }
        .btn-save-all:hover { background-color: var(--emerald-dark); transform: translateY(-2px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto align-items-center">
            <a class="nav-link fw-bold text-emerald me-3" th:href="@{/quiz/{id}/attempts(id=${quiz.id})}">
                <i class="fas fa-arrow-left me-1"></i> Back to Attempts
            </a>
            <a class="btn btn-outline-danger btn-sm fw-bold rounded-pill px-3" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="mgmt-header shadow-lg">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-1"><i class="fas fa-layer-group me-2"></i>Bulk Grading Mode</h2>
                <p class="mb-0 opacity-80" th:text="${quiz.title}">Quiz Title</p>
            </div>
            <div class="text-end d-none d-md-block">
                <span class="badge bg-white text-dark p-2 px-3 rounded-pill fw-bold">
                    <i class="fas fa-user-edit me-1 text-emerald"></i> Open Questions Only
                </span>
            </div>
        </div>
    </div>

    <div th:if="${openQuestions.empty}" class="alert alert-warning border-0 shadow-sm p-4 rounded-3">
        <div class="d-flex align-items-center">
            <i class="fas fa-exclamation-triangle fa-2x me-3"></i>
            <div>
                <h5 class="fw-bold mb-0">No Open Questions Found</h5>
                <p class="mb-0 opacity-75">This quiz consists entirely of auto-gradable questions.</p>
            </div>
        </div>
    </div>

    <form th:action="@{/quiz/{quizId}/grade-open(quizId=${quiz.id})}" method="post" th:if="${!openQuestions.empty}">
        
        <div th:each="question : ${openQuestions}" class="question-block">
            <div class="question-title-bar">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold">
                        <i class="far fa-question-circle me-2"></i>
                        <span th:text="${question.questionText}">Question Text</span>
                    </h5>
                    <span class="badge bg-emerald-light text-success" th:text="${question.marks + ' Points Max'}">1 Points</span>
                </div>
            </div>

            <div class="question-body">
                <div th:each="attempt : ${attempts}" class="student-submission">
                    <div class="row align-items-start g-4">
                        <div class="col-md-3">
                            <div class="d-flex align-items-center">
                                <div class="avatar-sm me-2 bg-light rounded-circle d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                                    <i class="fas fa-user text-muted small"></i>
                                </div>
                                <span class="fw-bold text-dark" th:text="${attempt.student.firstName + ' ' + attempt.student.lastName}">Student Name</span>
                            </div>
                        </div>
                        
                        <div class="col-md-5">
                            <label class="form-label">Student Response</label>
                            <div class="answer-text" th:text="${attempt.answers.get(question.id) != null ? attempt.answers.get(question.id) : 'No answer submitted.'}">
                                Answer content
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="row g-2">
                                <div class="col-6">
                                    <label th:for="${'score_' + question.id + '_' + attempt.id}" class="form-label text-emerald">Score</label>
                                    <div class="input-group">
                                        <input type="number" class="form-control score-input" 
                                               th:id="${'score_' + question.id + '_' + attempt.id}" 
                                               th:name="${'score_' + question.id + '_' + attempt.id}" 
                                               min="0" th:max="${question.marks}" step="0.1" 
                                               value="0" required>
                                        <span class="input-group-text bg-white">/ <span th:text="${question.marks}">1</span></span>
                                    </div>
                                </div>
                                <div class="col-12 mt-2">
                                    <label th:for="${'feedback_' + question.id + '_' + attempt.id}" class="form-label">Quick Feedback</label>
                                    <textarea class="form-control" 
                                              th:id="${'feedback_' + question.id + '_' + attempt.id}" 
                                              th:name="${'feedback_' + question.id + '_' + attempt.id}" 
                                              rows="1" placeholder="Optional comment..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="fixed-bottom bg-white border-top p-3 shadow-lg">
            <div class="container d-flex justify-content-center gap-3">
                <button type="submit" class="btn btn-save-all">
                    <i class="fas fa-cloud-upload-alt me-2"></i>Submit All Graded Questions
                </button>
                <a th:href="@{/quiz/{id}/attempts(id=${quiz.id})}" class="btn btn-light border px-4 rounded-pill fw-bold d-flex align-items-center">
                    Discard Changes
                </a>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
