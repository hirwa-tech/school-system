<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Editor - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 100px;
            padding-bottom: 60px;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .form-card {
            background: white;
            border: 1px solid var(--slate-200);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 850px;
            margin: 0 auto;
        }

        .form-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem;
            text-align: center;
            color: white;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-900);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 2px solid var(--slate-200);
            transition: all 0.2s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--emerald);
            box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.1);
        }

        .input-group-text {
            background-color: #f8fafc;
            border: 2px solid var(--slate-200);
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: var(--slate-700);
        }

        
        #optionsSection {
            background-color: #f1f5f9;
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px dashed var(--slate-200);
        }

        .btn-emerald {
            background-color: var(--emerald);
            color: white;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-weight: 700;
            border: none;
            transition: all 0.2s;
        }

        .btn-emerald:hover {
            background-color: var(--emerald-dark);
            color: white;
            transform: translateY(-1px);
        }

        .btn-add-option {
            background: white;
            border: 2px solid var(--emerald);
            color: var(--emerald);
            font-weight: 700;
            border-radius: 10px;
        }

        .btn-remove-option {
            border-radius: 0 12px 12px 0;
            border: 2px solid #ef4444;
            border-left: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto align-items-center">
            <a class="nav-link fw-bold text-muted me-3" th:href="@{/quiz/{id}/questions(id=${quizId})}">Discard Changes</a>
            <a class="btn btn-outline-danger btn-sm fw-bold rounded-pill px-3" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <div class="form-header">
            <div class="mb-2">
                <i class="fas fa-edit fa-2x opacity-50"></i>
            </div>
            <h2 class="fw-bold mb-1" th:text="${question.id != null ? 'Edit Question' : 'Create Question'}"></h2>
            <p class="mb-0 opacity-75">Define question parameters and grading logic</p>
        </div>

        <div class="card-body p-4 p-md-5">
            <form th:action="${question.id != null ? '/quiz/' + quizId + '/question/' + question.id + '/edit' : '/quiz/' + quizId + '/question/create'}" 
                  method="post">
                
                <div class="mb-4">
                    <label for="questionText" class="form-label">Question Content</label>
                    <textarea class="form-control" id="questionText" name="questionText" rows="3" 
                              placeholder="Type your question prompt here..." required 
                              th:text="${question.questionText}"></textarea>
                </div>
                
                <div class="row g-4 mb-4">
                    <div class="col-md-8">
                        <label for="type" class="form-label">Response Type</label>
                        <select class="form-select" id="type" name="type" required onchange="toggleOptions()">
                            <option value="MULTIPLE_CHOICE" th:selected="${question.type == 'MULTIPLE_CHOICE'}">Multiple Choice (Auto-graded)</option>
                            <option value="FILL_IN_THE_GAP" th:selected="${question.type == 'FILL_IN_THE_GAP'}">Fill in the Gap (Auto-graded)</option>
                            <option value="OPEN_QUESTION" th:selected="${question.type == 'OPEN_QUESTION'}">Open Ended (Manual grading)</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label for="marks" class="form-label">Points</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-award"></i></span>
                            <input type="number" class="form-control" id="marks" name="marks" 
                                   th:value="${question.marks != null ? question.marks : 1}" min="1" required>
                        </div>
                    </div>
                </div>
                
                <div class="mb-4" id="optionsSection">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <label class="form-label mb-0 text-emerald"><i class="fas fa-layer-group me-2"></i>Choice Options</label>
                        <button type="button" class="btn btn-sm btn-add-option" onclick="addOption()">
                            <i class="fas fa-plus me-1"></i> Add Choice
                        </button>
                    </div>
                    
                    <div id="optionsContainer">
                        <div class="input-group mb-2" th:each="opt, iterStat : ${question.options}">
                            <span class="input-group-text fw-bold" th:text="${iterStat.index + 1}"></span>
                            <input type="text" class="form-control" name="options" th:value="${opt}">
                            <button type="button" class="btn btn-outline-danger btn-remove-option" onclick="removeOption(this)">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                        
                        <div class="input-group mb-2" th:if="${question.options == null or #lists.isEmpty(question.options)}">
                            <span class="input-group-text fw-bold">1</span>
                            <input type="text" class="form-control" name="options" placeholder="Example Option A">
                            <button type="button" class="btn btn-outline-danger btn-remove-option" onclick="removeOption(this)">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="mb-5" id="answerFieldContainer">
                    <label for="correctAnswer" class="form-label">Correct Key</label>
                    <div class="input-group">
                        <span class="input-group-text bg-emerald text-white" style="border-color: var(--emerald);"><i class="fas fa-check-circle"></i></span>
                        <input type="text" class="form-control" id="correctAnswer" name="correctAnswer" 
                               style="border-color: var(--emerald);"
                               placeholder="Enter correct text/option" th:value="${question.correctAnswer}">
                    </div>
                    <div class="form-text mt-2" id="answerHelpText">
                        <strong>Note:</strong> Multiple choice answers must match the option text exactly.
                    </div>
                </div>
                
                <hr class="mb-4 opacity-10">

                <div class="d-flex flex-column flex-md-row gap-3">
                    <button type="submit" class="btn btn-emerald flex-grow-1">
                        <i class="fas fa-save me-2"></i>Save Question Details
                    </button>
                    <a th:href="@{/quiz/{id}/questions(id=${quizId})}" class="btn btn-light border fw-bold px-4 py-2 rounded-pill d-flex align-items-center justify-content-center">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function addOption() {
        const container = document.getElementById('optionsContainer');
        const optionCount = container.children.length + 1;
        const div = document.createElement('div');
        div.className = 'input-group mb-2';
        div.innerHTML = `
            <span class="input-group-text fw-bold">${optionCount}</span>
            <input type="text" class="form-control" name="options" placeholder="Option ${optionCount}">
            <button type="button" class="btn btn-outline-danger btn-remove-option" onclick="removeOption(this)">
                <i class="fas fa-trash-alt"></i>
            </button>
        `;
        container.appendChild(div);
    }
    
    function removeOption(btn) {
        if(document.getElementById('optionsContainer').children.length > 1) {
            btn.parentElement.remove();
            renumberOptions();
        }
    }

    function renumberOptions() {
        const container = document.getElementById('optionsContainer');
        Array.from(container.children).forEach((div, index) => {
            div.querySelector('.input-group-text').textContent = index + 1;
        });
    }
    
    function toggleOptions() {
        const type = document.getElementById('type').value;
        const optionsSection = document.getElementById('optionsSection');
        const answerContainer = document.getElementById('answerFieldContainer');
        const helpText = document.getElementById('answerHelpText');

        if (type === 'MULTIPLE_CHOICE') {
            optionsSection.style.display = 'block';
            answerContainer.style.display = 'block';
            helpText.innerHTML = "<strong>MCQ:</strong> Type the exact text of the correct choice above.";
        } else if (type === 'FILL_IN_THE_GAP') {
            optionsSection.style.display = 'none';
            answerContainer.style.display = 'block';
            helpText.innerHTML = "<strong>Fill Gap:</strong> The system will auto-grade if student input matches this exactly.";
        } else {
            optionsSection.style.display = 'none';
            answerContainer.style.display = 'none'; 
        }
    }
    
    toggleOptions();
</script>
</body>
</html>
