<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Quiz - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 100px;
            padding-bottom: 50px;
            min-height: 100vh;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .form-card {
            background: white;
            border-radius: 24px;
            border: 1px solid var(--slate-200);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            max-width: 750px;
            margin: 0 auto;
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem;
            color: white;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-700);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border: 2px solid var(--slate-200);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--emerald);
            box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.1);
        }

        .btn-save {
            background-color: var(--emerald);
            border: none;
            border-radius: 12px;
            padding: 1rem 2rem;
            font-weight: 700;
            color: white;
            transition: all 0.2s;
        }

        .btn-save:hover {
            background-color: var(--emerald-dark);
            transform: translateY(-1px);
        }

        .anti-cheat-box {
            background-color: var(--emerald-light);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid rgba(22, 101, 52, 0.2);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto align-items-center">
            <a class="nav-link fw-bold text-emerald me-3" th:href="@{/quiz/{id}/questions(id=${quiz.id})}">
                <i class="fas fa-tasks me-1"></i> Manage Questions
            </a>
            <a class="btn btn-outline-danger btn-sm fw-bold rounded-pill px-3" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <div class="form-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="fw-bold mb-1">Edit Quiz Settings</h2>
                    <p class="mb-0 opacity-80">Modify assessment parameters and security</p>
                </div>
                <i class="fas fa-edit fa-2x opacity-50"></i>
            </div>
        </div>

        <div class="card-body p-4 p-md-5">
            <form th:action="@{/quiz/{id}/edit(id=${quiz.id})}" method="post">
                
                <div class="mb-4">
                    <label for="title" class="form-label">Title</label>
                    <input type="text" class="form-control" id="title" name="title" 
                           th:value="${quiz.title}" required placeholder="Enter quiz title">
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3" 
                              th:text="${quiz.description}" placeholder="Describe the quiz expectations..."></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="timeLimit" class="form-label">Time Limit (mins)</label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="timeLimit" name="timeLimit" 
                                   th:value="${quiz.timeLimit}">
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="attemptLimit" class="form-label">Attempt Limit</label>
                        <input type="number" class="form-control" id="attemptLimit" name="attemptLimit" 
                               min="1" th:value="${quiz.attemptLimit != null ? quiz.attemptLimit : 1}">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="deadline" class="form-label">Submission Deadline</label>
                    <input type="datetime-local" class="form-control" id="deadline" name="deadline" 
                           th:value="${quiz.deadline != null ? quiz.deadline : ''}">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Update Password</label>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Leave blank to keep current password">
                    <small class="text-muted">Security measure: Current password is encrypted and not shown.</small>
                </div>

                <div class="mb-5 anti-cheat-box">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="antiCheatEnabled" name="antiCheatEnabled" 
                               th:checked="${quiz.antiCheatEnabled}">
                        <label class="form-check-label fw-bold text-emerald" for="antiCheatEnabled">
                            <i class="fas fa-shield-alt me-2"></i>Enable Anti-Cheating Surveillance
                        </label>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-sm-8">
                        <button type="submit" class="btn btn-save w-100">
                            <i class="fas fa-save me-2"></i>Save Changes
                        </button>
                    </div>
                    <div class="col-sm-4">
                        <a th:href="@{/quiz/{id}/questions(id=${quiz.id})}" class="btn btn-light w-100 border fw-bold py-3" style="border-radius: 12px;">
                            Cancel
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
