<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.S. GIHUNDWE Loading</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        body {
            background: #202123;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            padding: 20px; 
            box-sizing: border-box;
        }

       
        .logo {
            width: 80%; 
            max-width: 400px; 
            height: auto;
            margin-bottom: 30px;
            animation: fadeZoom 1.5s ease-out;
        }

        @keyframes fadeZoom {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        
        .progress-container {
            width: 90%;
            max-width: 300px;
            height: 6px;
            background: #3a3b3c;
            border-radius: 50px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff88, #00c853);
            border-radius: 50px;
            transition: width 0.1s linear;
        }

        
        .loading-text {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 1px;
            margin: 0;
        }

        #welcome {
            margin-top: 30px;
            font-size: 1.2rem; 
            color: gold;
            font-weight: bold;
            min-height: 1.5em; 
        }

        
        @media (min-width: 768px) {
            #welcome { font-size: 1.8rem; }
            .progress-container { height: 8px; }
        }
    </style>
</head>
<body>


    <img src="/images/log2.png" alt="G.S. Gihundwe Logo" class="logo">


    <div class="progress-container">
        <div id="bar-fill" class="progress-bar"></div>
    </div>
    
    <p class="loading-text">Loading...</p>
    
    <div id="welcome"></div>

    <script>
        
        let width = 0;
        const bar = document.getElementById("bar-fill");

        const loading = setInterval(() => {
            if (width >= 100) {
                clearInterval(loading);
                // Redirect to home page (backup - direct link below)
                /* setTimeout(() => {
                window.location.href = "/index";
                }, 500); */
                console.log("Loading complete. Click home link or navigate directly.");
            } else {
                width++;
                bar.style.width = width + "%";
            }
        }, 30);

       
        setTimeout(() => {
            welcomeEl.innerHTML += '<br><a href="/index" style="color: #00ff88; text-decoration: none; font-size: 14px;">→ Go to Home</a>';
        }, 3500);

       
        const text = "Welcome to G.S Gihundwe";
        let i = 0;
        const welcomeEl = document.getElementById("welcome");

        function typeWriter() {
            if (i < text.length) {
                welcomeEl.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 80);
            }
        }


        
        typeWriter();
    </script>
</body>
</html>
