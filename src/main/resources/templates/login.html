<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --lms-green: #28a745; 
            --lms-dark-green: #1e7e34;
            --lms-white: #ffffff; 
        }

        body {
            background-color: #f4f7f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .login-card {
            border: none;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            max-width: 1000px;
            width: 100%;
            background-color: var(--lms-white);
        }

        .lms-sidebar {
            background: linear-gradient(135deg, var(--lms-green) 0%, var(--lms-dark-green) 100%);
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-section {
            background-color: var(--lms-white);
            padding: 50px;
        }

        .nav-tabs {
            border-bottom: 2px solid #edf2f7;
            margin-bottom: 30px;
        }

        .nav-link {
            color: #718096;
            font-weight: 600;
            border: none !important;
            padding: 15px 25px;
            transition: 0.3s;
        }

        .nav-link.active {
            color: var(--lms-green) !important;
            border-bottom: 4px solid var(--lms-green) !important;
            background: none !important;
        }

        .btn-lms {
            background-color: var(--lms-green);
            color: white;
            border: none;
            padding: 14px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-lms:hover {
            background-color: var(--lms-dark-green);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
        }

        .feature-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            border-color: var(--lms-green);
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.1);
        }

       
        .password-field-container {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
            z-index: 10;
        }
        
        .password-toggle:hover {
            color: var(--lms-green);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card login-card">
        <div class="row g-0">
            <div class="col-lg-5 lms-sidebar text-center text-lg-start">
                <h1 class="fw-bold mb-2">LMS</h1>
                <p class="opacity-75 mb-5">Full Learning Management System</p>
                
                <div class="feature-box">
                    <h6 class="mb-1"><i class="fas fa-edit me-2"></i> Notes</h6>
                    <p class="small mb-0 opacity-90">Centralized workspace for all lecture materials.</p>
                </div>
                <div class="feature-box">
                    <h6 class="mb-1"><i class="fas fa-tasks me-2"></i> Homework</h6>
                    <p class="small mb-0 opacity-90">Manage assignments and track progress.</p>
                </div>
                <div class="feature-box">
                    <h6 class="mb-1"><i class="fas fa-lightbulb me-2"></i> Quizzes</h6>
                    <p class="small mb-0 opacity-90">Real-time evaluations and performance data.</p>
                </div>
            </div>

            <div class="col-lg-7 form-section">
                <ul class="nav nav-tabs justify-content-center" id="roleTabs" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#teacherForm">
                            <i class="fas fa-chalkboard-teacher me-2"></i>Teacher
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#studentForm">
                            <i class="fas fa-user-graduate me-2"></i>Student
                        </button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="teacherForm">
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Username</label>
                                <input type="text" class="form-control" name="username" placeholder="Enter teacher username" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Password</label>
                                <div class="password-field-container">
                                    <input type="password" class="form-control password-input" name="password" placeholder="••••••••" required>
                                    <i class="fas fa-eye password-toggle"></i>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-lms w-100">Access Portal</button>
                        </form>
                        <div class="text-center mt-4">
                            <span class="text-muted">New here?</span> 
                            <a href="/register" class="text-success fw-bold text-decoration-none ms-1">Create Account</a>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="studentForm">
                        <form th:action="@{/student/quick-login}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control" name="username" placeholder="Your name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Select Classroom</label>
                                <select class="form-select form-control" id="classroomSelect" name="classroomId" required>
                                    <option value="">Fetching classrooms...</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Access Code</label>
                                <div class="password-field-container">
                                    <input type="password" class="form-control password-input" name="classroomCode" placeholder="Classroom password" required>
                                    <i class="fas fa-eye password-toggle"></i>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-lms w-100">Join Classroom</button>
                        </form>
                    </div>
                </div>

                <div th:if="${param.error}" class="alert alert-danger mt-4 border-0 rounded-3">
                    <i class="fas fa-exclamation-triangle me-2"></i> Invalid credentials.
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/classroom-select.js"></script>

<script>
    
    document.querySelectorAll('.password-toggle').forEach(toggle => {
        toggle.addEventListener('click', function() {
            const input = this.previousElementSibling;
            if (input.type === "password") {
                input.type = "text";
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            }
        });
    });
</script>

</body>
</html>
