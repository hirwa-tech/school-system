<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | G.S.GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/header.css}" rel="stylesheet">
    <link th:href="@{/css/footer.css}" rel="stylesheet">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:0;
            background:#f7f7f7;
        }

       
        header{
            background:#0a7f2e;
            color:white;
            padding:15px 0;
        }

        .header-container{
            width:90%;
            margin:auto;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:22px;
            font-weight:bold;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-size:15px;
        }

        nav a:hover{
            text-decoration:underline;
        }

       

        .container{
            width:90%;
            margin:auto;
            padding:40px 0;
        }

        h1{
            text-align:center;
            color:#0a7f2e;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:40px;
        }

       

        .contact-cards{
            display:flex;
            justify-content:space-between;
            gap:20px;
            margin-bottom:40px;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            padding:30px;
            flex:1;
            min-width:250px;
            text-align:center;
            border-radius:12px;
            box-shadow:0 5px 12px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .icon{
            background:#e9f6ee;
            width:60px;
            height:60px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:auto;
            font-size:26px;
            color:#0a7f2e;
            margin-bottom:10px;
        }

       

        .contact-section{
            display:flex;
            gap:30px;
            flex-wrap:wrap;
        }

        .map{
            flex:1;
        }

        .map iframe{
            width:100%;
            height:350px;
            border-radius:10px;
            border:0;
        }

        .form{
            flex:1;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 12px rgba(0,0,0,0.08);
        }

        

        .form input, .form textarea{
            width:100%;
            padding:10px 5px;
            margin-bottom:20px;
            border:none;
            border-bottom:2px solid #ccc;
            outline:none;
            font-size:14px;
            background:transparent;
        }

        .form input:focus, .form textarea:focus{
            border-bottom:2px solid #0a7f2e;
        }

       

        .row{
            display:flex;
            gap:15px;
        }

        

        button{
            background:#0a7f2e;
            color:white;
            border:none;
            padding:12px;
            width:100%;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#066524;
        }
    </style>
</head>

<body>
    
<div th:replace="~{fragments/header :: publicHeader}"></div>

    <div class="container">

        <h1>Contact Us</h1>
        <p class="subtitle">Get in touch with our staff. We are available any time you want us.</p>

        <div class="contact-cards">

            <div class="card">
                <div class="icon"></div>
                <h3>Our Address</h3>
                <p>Rusizi – Gihundwe</p>
            </div>

            <div class="card">
                <div class="icon"></div>
                <h3>Email Us</h3>
                <p>info@gsgihundwe.ac.rw</p>
            </div>

            <div class="card">
                <div class="icon"></div>
                <h3>Call Us</h3>
                <p>+250 78X XXX XXX</p>
            </div>

        </div>

        <div class="contact-section">

            <div class="map">
                <iframe src="https://maps.google.com/maps?q=Gihundwe%20Rwanda&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
            </div>

            <div class="form">
                <div th:if="${success}" style="background: #d4edda; color: #155724; padding: 15px; border-radius: 6px; margin-bottom: 20px; text-align: center;">
                    <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
                </div>

                <form th:action="@{/contact}" method="post">
                    <div class="row">
                        <input type="text" name="name" placeholder="Your Name" required>
                        <input type="text" name="phone" placeholder="Your Phone">
                    </div>

                    <div class="row">
                        <input type="email" name="email" placeholder="Your Email" required>
                        <input type="text" name="subject" placeholder="Subject" required>
                    </div>

                    <textarea rows="5" name="message" placeholder="Message" required></textarea>

                    <button type="submit">Send Message</button>
                </form>
            </div>

        </div>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
