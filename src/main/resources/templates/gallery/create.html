<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Media - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
            --slate-50: #f8fafc;
        }

        body { 
            background-color: var(--slate-50); 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            color: var(--slate-900);
        }

       
        .navbar { 
            background: white;
            border-bottom: 1px solid var(--slate-200);
            padding: 1rem 0;
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; letter-spacing: -0.5px; }
        .nav-link { font-weight: 600; color: var(--slate-700) !important; transition: 0.3s; }

       
        .school-header { 
            text-align: center; 
            padding: 50px 20px; 
            background: linear-gradient(135deg, var(--emerald) 0%, #064e3b 100%); 
            color: white;
        }
        .school-header h1 { font-size: 1.8rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 1.5px; }

        
        .admin-card { 
            border: none; 
            border-radius: 24px; 
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            margin-top: -30px;
            overflow: hidden;
            margin-bottom: 60px;
        }
        
        .card-header-custom {
            background-color: var(--emerald-light);
            padding: 25px 35px;
            border-bottom: 1px solid var(--slate-200);
            color: var(--emerald);
            display: flex;
            align-items: center;
        }
        .card-header-custom h4 { margin: 0; font-weight: 800; font-size: 1.25rem; }

        .card-body { padding: 40px; }

        
        .form-label { 
            font-weight: 700; 
            color: var(--slate-700); 
            margin-bottom: 10px; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
        }
        
        .form-control { 
            border-radius: 12px; 
            padding: 14px 18px; 
            border: 2px solid var(--slate-200);
            background-color: var(--slate-50);
            transition: all 0.2s ease;
        }
        
        .form-control:focus { 
            background-color: white;
            border-color: var(--emerald); 
            box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.08); 
        }

        
        .upload-zone {
            border: 2px dashed var(--slate-200);
            padding: 30px;
            border-radius: 15px;
            background: #ffffff;
            text-align: center;
            transition: 0.3s;
        }
        .upload-zone:hover { border-color: var(--emerald); background: var(--emerald-light); }

       
        .btn-upload { 
            background-color: var(--emerald); 
            border: none; 
            color: white; 
            padding: 14px 35px; 
            font-weight: 700; 
            border-radius: 12px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-upload:hover { background-color: #064e3b; transform: translateY(-2px); color: white; }
        
        .btn-cancel { 
            background-color: white; 
            border: 2px solid var(--slate-200); 
            color: var(--slate-700); 
            padding: 14px 30px; 
            font-weight: 700; 
            border-radius: 12px; 
        }

        .icon-badge {
            width: 45px;
            height: 45px;
            background: var(--emerald);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-graduation-cap me-2"></i>G.S GIHUNDWE</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/news"><i class="fas fa-newspaper me-1"></i> News</a>
                <a class="nav-link" href="/gallery"><i class="fas fa-images me-1"></i> Gallery</a>
            </div>
        </div>
    </nav>

    <div class="school-header">
        <h1>Gallery Management</h1>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card admin-card">
                    <div class="card-header-custom">
                        <div class="icon-badge">
                            <i class="fas fa-photo-video"></i>
                        </div>
                        <h4>Add New Media Entry</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/gallery/create}" method="post" enctype="multipart/form-data">
                            
                            <div class="mb-4">
                                <label for="title" class="form-label">Media Title</label>
                                <input type="text" class="form-control" id="title" name="title" required placeholder="e.g., The web was created in 2026 with HC student...">
                            </div>
                            
                            <div class="mb-4">
                                <label for="description" class="form-label">Caption / Description <span class="text-muted small fw-normal">(Optional)</span></label>
                                <textarea class="form-control" id="description" name="description" rows="3" placeholder="Briefly describe this photo or video..."></textarea>
                            </div>
                            
                            <div class="mb-5">
                                <label class="form-label">File Selection</label>
                                <div class="upload-zone">
                                    <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
                                    <input type="file" class="form-control mb-2" id="file" name="file" accept="image/*,video/*" required>
                                    <p class="text-muted small mb-0">Supported formats: JPG, PNG, GIF, MP4, WebM</p>
                                </div>
                            </div>
                            
                            <div class="d-flex align-items-center gap-3 border-top pt-4">
                                <button type="submit" class="btn btn-upload flex-grow-1">
                                    <i class="fas fa-cloud-upload-alt me-2"></i>START UPLOAD
                                </button>
                                <a href="/gallery" class="btn btn-cancel">
                                    CANCEL
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
                <p class="text-center text-muted small">
                    <i class="fas fa-lock me-1"></i> Authorized Personnel Only - Media Upload Portal
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
