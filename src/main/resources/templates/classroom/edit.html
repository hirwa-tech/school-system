<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Classroom - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-600: #475569;
            --slate-200: #e2e8f0;
        }

        body {
            background: radial-gradient(circle at top left, #ffffff, #f1f5f9);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-bottom: 50px;
        }

       
        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

       
        .form-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            max-width: 600px;
            margin: 100px auto 0;
            border: 1px solid var(--slate-200);
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-900);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

      
        .input-group-text {
            background-color: #f8fafc;
            border: 2px solid var(--slate-200);
            color: var(--slate-600);
            border-radius: 12px 0 0 12px;
        }

        .form-control {
            border-radius: 0 12px 12px 0;
            padding: 12px 15px;
            border: 2px solid var(--slate-200);
            background-color: #f8fafc;
            transition: all 0.2s ease-in-out;
        }

        .form-control:focus {
            border-color: var(--emerald);
            background-color: white;
            box-shadow: none;
        }

        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control,
        .input-group:focus-within .btn-toggle-pwd {
            border-color: var(--emerald);
        }

        .btn-toggle-pwd {
            border: 2px solid var(--slate-200);
            border-left: none;
            background-color: #f8fafc;
            color: var(--slate-600);
            border-radius: 0 12px 12px 0;
        }

       
        .btn-update {
            background-color: var(--emerald);
            border: none;
            border-radius: 12px;
            padding: 14px 30px;
            font-weight: 700;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(22, 101, 52, 0.2);
        }

        .btn-update:hover {
            background-color: var(--emerald-dark);
            transform: translateY(-2px);
            color: white;
        }

        .btn-cancel {
            border-radius: 12px;
            padding: 14px 30px;
            font-weight: 600;
            color: var(--slate-600);
            border: 2px solid var(--slate-200);
            transition: background 0.2s;
        }
        
        .btn-cancel:hover {
            background-color: #f8fafc;
            color: var(--slate-900);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link fw-bold text-dark" href="/dashboard">Dashboard</a>
            <a class="nav-link fw-bold text-danger" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <div class="form-header">
            <i class="fas fa-edit" style="font-size: 2.5rem; margin-bottom: 10px;"></i>
            <h2 class="mb-0 fw-bold">Edit Classroom</h2>
            <p class="mb-0 opacity-90">Updating details for <span th:text="${classroom.name}" class="fw-bold text-white">Class Name</span></p>
        </div>
        
        <div class="card-body p-4 p-lg-5">
            <form th:action="@{/classroom/{id}/edit(id=${classroom.id})}" method="post">
                
                <div class="mb-4">
                    <label for="name" class="form-label">Classroom Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-chalkboard"></i></span>
                        <input type="text" class="form-control" id="name" name="name" 
                               th:value="${classroom.name}" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">Description</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius: 12px 0 0 12px;"><i class="fas fa-align-left"></i></span>
                        <textarea class="form-control" id="description" name="description" rows="4" 
                                  th:text="${classroom.description}" style="border-radius: 0 12px 12px 0;"></textarea>
                    </div>
                </div>

                <div class="mb-5">
                    <label for="password" class="form-label">Change Join Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Leave blank to keep current" style="border-radius: 0;">
                        <button class="btn btn-toggle-pwd" type="button" id="togglePassword">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <small class="text-muted mt-2 d-block">
                        <i class="fas fa-shield-alt me-1 text-success"></i> Only update this if you want to change the access code.
                    </small>
                </div>

                <div class="row g-3">
                    <div class="col-md-7">
                        <button type="submit" class="btn btn-update w-100">
                            <i class="fas fa-check-circle me-2"></i>Save Changes
                        </button>
                    </div>
                    <div class="col-md-5">
                        <a th:href="@{/classroom/{id}(id=${classroom.id})}" 
                           class="btn btn-cancel w-100 text-decoration-none d-block text-center">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const eyeIcon = document.querySelector('#eyeIcon');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        eyeIcon.classList.toggle('fa-eye');
        eyeIcon.classList.toggle('fa-eye-slash');
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
