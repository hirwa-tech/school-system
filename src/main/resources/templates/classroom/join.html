<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Classroom - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-600: #475569;
            --slate-200: #e2e8f0;
        }

        body {
            background: radial-gradient(circle at top left, #ffffff, #f1f5f9);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            padding-top: 80px; 
        }

       
        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

       
        .join-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            border: 1px solid var(--slate-200);
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
       
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .join-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-900);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .input-group-text {
            background-color: #f8fafc;
            border: 2px solid var(--slate-200);
            color: var(--slate-600);
            border-radius: 12px 0 0 12px;
        }

        .form-control {
            border-radius: 0;
            padding: 14px 15px;
            border: 2px solid var(--slate-200);
            border-left: none;
            background-color: #f8fafc;
            font-size: 1.1rem;
        }

        .form-control:focus {
            border-color: var(--slate-200);
            background-color: white;
            box-shadow: none;
        }

        .btn-toggle-pwd {
            border: 2px solid var(--slate-200);
            border-left: none;
            background-color: #f8fafc;
            color: var(--slate-600);
            border-radius: 0 12px 12px 0;
            padding: 0 15px;
        }

        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control,
        .input-group:focus-within .btn-toggle-pwd {
            border-color: var(--emerald);
        }

        .btn-join {
            background-color: var(--emerald);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            color: white;
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .btn-join:hover {
            background-color: var(--emerald-dark);
            transform: translateY(-2px);
            color: white;
        }

        .btn-cancel {
            color: var(--slate-600);
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .alert-custom {
            border-radius: 12px;
            font-weight: 600;
            background-color: #fef2f2;
            color: #b91c1c;
            border: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link fw-bold text-danger" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container d-flex flex-grow-1 align-items-center justify-content-center">
    <div class="join-card">
        <div class="join-header">
            <i class="fas fa-door-open" style="font-size: 2.5rem; margin-bottom: 10px;"></i>
            <h2 class="mb-0 fw-bold">Join Class</h2>
            <p class="mb-0 opacity-90">Enter the access code provided by your teacher</p>
        </div>
        
        <div class="card-body p-4 p-lg-5">
            <form th:action="@{/classroom/{id}/join(id=${classroomId})}" method="post">
                <div class="mb-4">
                    <label for="password" class="form-label">Classroom Access Code</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-key"></i></span>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Enter code here" required autofocus>
                        <button class="btn btn-toggle-pwd" type="button" id="togglePassword">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-join">
                    <i class="fas fa-sign-in-alt me-2"></i>Enroll Now
                </button>
                
                <div class="text-center">
                    <a href="/dashboard" class="btn-cancel">Cancel and Go Back</a>
                </div>
            </form>

            <div th:if="${error}" class="alert alert-custom py-3 text-center">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span th:text="${error}">Invalid code. Please try again.</span>
            </div>
        </div>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const eyeIcon = document.querySelector('#eyeIcon');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        eyeIcon.classList.toggle('fa-eye');
        eyeIcon.classList.toggle('fa-eye-slash');
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
