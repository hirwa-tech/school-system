<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Management - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-600: #475569;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 80px;
        }

        
        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        
        .mgmt-card {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--slate-200);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .mgmt-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem;
            color: white;
        }

        
        .table-container { padding: 1.5rem; }
        .table { margin-bottom: 0; }
        .table thead th {
            background-color: #f1f5f9;
            color: var(--slate-600);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            border-top: none;
            padding: 1rem;
        }
        .table tbody td { 
            vertical-align: middle; 
            padding: 1rem;
            color: var(--slate-900);
            border-color: var(--slate-200);
        }

        .student-badge {
            background-color: var(--emerald-light);
            color: var(--emerald);
            font-weight: 700;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
        }

        .btn-action {
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto align-items-center">
            <span class="navbar-text me-3 fw-medium text-dark">
                <i class="far fa-user-circle me-1"></i> <span th:text="${user.firstName + ' ' + user.lastName}">User</span>
            </span>
            <a class="btn btn-outline-danger btn-sm fw-bold rounded-pill px-3" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="mgmt-card">
        <div class="mgmt-header">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                <div>
                    <h2 class="fw-bold mb-1"><i class="fas fa-chalkboard-teacher me-2"></i>Classrooms Management</h2>
                    <p class="mb-0 opacity-90">Administrative overview of all academic spaces</p>
                </div>
                <a href="/dashboard" class="btn btn-light rounded-pill px-4 fw-bold">
                    <i class="fas fa-arrow-left me-2"></i>Dashboard
                </a>
            </div>
        </div>

        <div class="table-container">
            <div th:if="${classrooms.isEmpty()}" class="text-center py-5">
                <div class="mb-3">
                    <i class="fas fa-folder-open text-muted" style="font-size: 3.5rem; opacity: 0.3;"></i>
                </div>
                <h5 class="text-slate-600 fw-bold">No Classrooms Found</h5>
                <p class="text-muted">There are currently no active classrooms in the system.</p>
            </div>

            <div th:unless="${classrooms.isEmpty()}" class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Classroom Name</th>
                            <th>Assigned Teacher</th>
                            <th class="text-center">Enrolled Students</th>
                            <th class="text-end">Administrative Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="classroom : ${classrooms}">
                            <td class="fw-bold text-muted" th:text="${'#' + classroom.id}">#1</td>
                            <td>
                                <div class="fw-bold" th:text="${classroom.name}">Class Name</div>
                            </td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar-sm me-2 bg-light rounded-circle p-1 text-center" style="width:30px">
                                        <i class="fas fa-user-tie text-secondary"></i>
                                    </div>
                                    <span th:text="${classroom.teacher.username}">Teacher</span>
                                </div>
                            </td>
                            <td class="text-center">
                                <span class="student-badge">
                                    <i class="fas fa-users me-1 small"></i>
                                    <span th:text="${#lists.size(classroom.students)}">0</span>
                                </span>
                            </td>
                            <td class="text-end">
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{'/classroom/' + ${classroom.id} + '/edit'}" 
                                       class="btn btn-action btn-outline-primary" 
                                       title="Edit Classroom">
                                        <i class="fas fa-pencil-alt"></i>
                                    </a>
                                    
                                    <form th:action="@{'/dashboard/classrooms/' + ${classroom.id} + '/delete'}" 
                                          method="post" 
                                          class="d-inline" 
                                          onsubmit="return confirm('WARNING: This will permanently delete the classroom and all associated materials (Notes, Quizzes, Homework). Continue?')">
                                        <button type="submit" class="btn btn-action btn-outline-danger" title="Delete Classroom">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
