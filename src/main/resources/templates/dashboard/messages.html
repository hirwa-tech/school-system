<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-600: #475569;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 80px;
            min-height: 100vh;
        }

        
        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        
        .mgmt-card {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--slate-200);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .mgmt-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem;
            color: white;
        }

    
        .table-container { padding: 1.5rem; }
        .table { margin-bottom: 0; }
        .table thead th {
            background-color: #f1f5f9;
            color: var(--slate-600);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            border-top: none;
            padding: 1rem;
        }
        .table tbody td { 
            vertical-align: middle; 
            padding: 1rem;
            color: var(--slate-900);
            border-color: var(--slate-200);
            font-size: 0.9rem;
        }

        .type-badge {
            background-color: var(--emerald-light);
            color: var(--emerald);
            font-weight: 700;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .btn-action-group .btn {
            padding: 0.375rem 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto align-items-center">
            <span class="navbar-text me-3 fw-medium text-dark">
                <i class="far fa-user-circle me-1"></i> <span th:text="${user.firstName + ' ' + user.lastName}">User</span>
            </span>
            <a class="btn btn-outline-danger btn-sm fw-bold rounded-pill px-3" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="mgmt-card">
        <div class="mgmt-header">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                <div>
                    <h2 class="fw-bold mb-1"><i class="fas fa-envelope-open-text me-2"></i>Messages & Inquiries</h2>
                    <p class="mb-0 opacity-90">Manage admission requests and general contact forms</p>
                </div>
                <a href="/dashboard" class="btn btn-light rounded-pill px-4 fw-bold">
                    <i class="fas fa-arrow-left me-2"></i>Dashboard
                </a>
            </div>
        </div>

        <div class="table-container">
            <div th:if="${messages.isEmpty()}" class="text-center py-5">
                <div class="mb-3">
                    <i class="fas fa-inbox text-muted" style="font-size: 4rem; opacity: 0.2;"></i>
                </div>
                <h5 class="text-slate-600 fw-bold">Your inbox is empty</h5>
                <p class="text-muted">New inquiries from the website will appear here.</p>
            </div>

            <div th:unless="${messages.isEmpty()}" class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Type</th>
                            <th>Sender</th>
                            <th>Email Address</th>
                            <th>Phone</th>
                            <th>Subject/Level</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="msg : ${messages}">
                            <td class="text-muted fw-medium" th:text="${#temporals.format(msg.createdAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                            <td>
                                <span class="type-badge" th:text="${msg.type}">Type</span>
                            </td>
                            <td>
                                <div class="fw-bold" th:text="${msg.name}">Name</div>
                            </td>
                            <td th:text="${msg.email}">Email</td>
                            <td th:text="${msg.phone}">Phone</td>
                            <td>
                                <span class="text-truncate d-inline-block" style="max-width: 150px;" 
                                      th:text="${msg.subject != null ? msg.subject : msg.classLevel}">Subject</span>
                            </td>
                            <td class="text-end">
                                <div class="btn-group btn-action-group shadow-sm">
                                    <a th:href="@{'/dashboard/messages/' + ${msg.id}}" class="btn btn-white border">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>
                                    
                                    <a th:href="@{'/uploads/messages/' + ${msg.fileUrl}}" th:if="${msg.fileUrl}" 
                                       class="btn btn-white border" target="_blank" title="Download File">
                                        <i class="fas fa-download text-success"></i>
                                    </a>
                                    
                                    <form th:action="@{'/dashboard/messages/' + ${msg.id} + '/delete'}" method="post" class="d-inline"
                                          onsubmit="return confirm('Delete this message permanently?')">
                                        <button type="submit" class="btn btn-white border">
                                            <i class="fas fa-trash-alt text-danger"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
