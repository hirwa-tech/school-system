<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Message - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --slate-900: #0f172a;
            --slate-600: #475569;
            --slate-200: #e2e8f0;
            --slate-50: #f8fafc;
        }

        body {
            background-color: #f1f5f9;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 80px;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .message-card {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--slate-200);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .message-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2rem;
            color: white;
        }

        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--slate-600);
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-weight: 600;
            color: var(--slate-900);
            margin-bottom: 1.25rem;
        }

        .message-body-content {
            background-color: var(--slate-50);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--slate-200);
            white-space: pre-wrap;
            color: var(--slate-900);
            line-height: 1.6;
        }

        .meta-box {
            border-left: 4px solid var(--emerald);
            padding-left: 1rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link fw-bold text-emerald" href="/dashboard/messages">
                <i class="fas fa-arrow-left me-1"></i> Back to Inbox
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="message-card">
                <div class="message-header">
                    <span class="badge bg-white text-success mb-2 px-3 py-2 rounded-pill fw-bold" th:text="${message.type}">TYPE</span>
                    <h3 class="fw-bold mb-0">Message Details</h3>
                </div>

                <div class="card-body p-4 p-md-5">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="meta-box mb-4">
                                <div class="info-label">From</div>
                                <div class="info-value fs-5" th:text="${message.name}">Sender Name</div>
                                
                                <div class="info-label">Contact Details</div>
                                <div class="info-value">
                                    <i class="far fa-envelope me-2 text-muted"></i><span th:text="${message.email}">email@example.com</span><br>
                                    <i class="fas fa-phone-alt me-2 text-muted"></i><span th:text="${message.phone}">Phone</span>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="bg-light p-4 rounded-3 border">
                                <div class="info-label">Received On</div>
                                <div class="info-value" th:text="${#temporals.format(message.createdAt, 'MMMM dd, yyyy - HH:mm')}">Date</div>

                                <div class="info-label">Subject / Class Reference</div>
                                <div class="info-value text-emerald" th:text="${message.subject != null ? message.subject : message.classLevel}">Subject</div>

                                <div th:if="${message.fileUrl}" class="mt-3">
                                    <a th:href="@{'/uploads/messages/' + ${message.fileUrl}}" class="btn btn-emerald w-100 rounded-pill fw-bold" style="background-color: var(--emerald); color: white;" target="_blank">
                                        <i class="fas fa-paperclip me-2"></i> View Attachment
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="info-label">Message Content</div>
                    <div class="message-body-content" th:text="${message.message}">
                        The message content will appear here...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
