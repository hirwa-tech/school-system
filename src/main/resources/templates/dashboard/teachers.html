<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers Management - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-600: #475569;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 80px;
            min-height: 100vh;
        }

       
        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        
        .mgmt-card {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--slate-200);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .mgmt-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem;
            color: white;
        }

       
        .table-container { padding: 1.5rem; }
        .table { margin-bottom: 0; }
        .table thead th {
            background-color: #f1f5f9;
            color: var(--slate-600);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            border-top: none;
            padding: 1rem;
        }
        .table tbody td { 
            vertical-align: middle; 
            padding: 1rem;
            color: var(--slate-900);
            border-color: var(--slate-200);
        }

        .teacher-avatar {
            width: 35px;
            height: 35px;
            background-color: var(--emerald-light);
            color: var(--emerald);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn-action-group .btn {
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto align-items-center">
            <span class="navbar-text me-3 fw-medium text-dark">
                <i class="far fa-user-circle me-1 text-emerald"></i> 
                <span th:text="${user.firstName + ' ' + user.lastName}">User</span>
            </span>
            <a class="btn btn-outline-danger btn-sm fw-bold rounded-pill px-3" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="mgmt-card">
        <div class="mgmt-header">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                <div>
                    <h2 class="fw-bold mb-1"><i class="fas fa-chalkboard-teacher me-2"></i>Teachers Management</h2>
                    <p class="mb-0 opacity-90">Manage faculty accounts and system access</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="/dashboard" class="btn btn-light rounded-pill px-4 fw-bold">
                        <i class="fas fa-arrow-left me-2"></i>Dashboard
                    </a>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div th:if="${teachers.isEmpty()}" class="text-center py-5">
                <div class="mb-3">
                    <i class="fas fa-users-slash text-muted" style="font-size: 4rem; opacity: 0.2;"></i>
                </div>
                <h5 class="text-slate-600 fw-bold">No Teachers Registered</h5>
                <p class="text-muted">Faculty accounts will appear here once they are added to the system.</p>
            </div>

            <div th:unless="${teachers.isEmpty()}" class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Username</th>
                            <th>Email Address</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="teacher : ${teachers}">
                            <td class="text-muted fw-bold" th:text="${'#' + teacher.id}">#1</td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="teacher-avatar me-3">
                                        <i class="fas fa-user-tie"></i>
                                    </div>
                                    <div class="fw-bold" th:text="${teacher.firstName + ' ' + teacher.lastName}">Teacher Name</div>
                                </div>
                            </td>
                            <td>
                                <code class="text-emerald fw-bold" th:text="${teacher.username}">username</code>
                            </td>
                            <td th:text="${teacher.email}">email@school.com</td>
                            <td class="text-end">
                                <div class="btn-group btn-action-group shadow-sm">
                                    <a th:href="@{'/users/' + ${teacher.id} + '/edit'}" 
                                       class="btn btn-white border" 
                                       title="Edit Account">
                                        <i class="fas fa-edit text-primary"></i>
                                    </a>
                                    
                                    <form th:action="@{'/users/' + ${teacher.id} + '/delete'}" 
                                          method="post" 
                                          class="d-inline"
                                          onsubmit="return confirm('Are you sure you want to delete this teacher account? This action cannot be undone.')">
                                        <button type="submit" class="btn btn-white border" title="Delete Account">
                                            <i class="fas fa-trash-alt text-danger"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
