<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit News - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
        }

        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            color: var(--slate-900);
        }

        
        .navbar { 
            background: white;
            border-bottom: 1px solid var(--slate-200);
            padding: 1rem 0;
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }
        .nav-link { font-weight: 600; color: var(--slate-700) !important; margin-left: 1.2rem; }

      
        .school-header { 
            text-align: center; 
            padding: 40px 20px; 
            background: linear-gradient(135deg, var(--emerald) 0%, #064e3b 100%); 
            color: white;
            margin-bottom: 40px;
        }
        .school-header h1 { font-size: 1.8rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

       
        .admin-card { 
            border: none; 
            border-radius: 20px; 
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 50px;
        }
        
        .card-header-custom {
            background-color: var(--emerald-light);
            padding: 20px 30px;
            border-bottom: 1px solid var(--slate-200);
            color: var(--emerald);
        }
        .card-header-custom h4 { margin: 0; font-weight: 700; font-size: 1.25rem; }

        .card-body { padding: 40px; }

       
        .form-label { font-weight: 700; color: var(--slate-700); margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; }
        .form-control { 
            border-radius: 10px; 
            padding: 12px 15px; 
            border: 2px solid var(--slate-200);
            transition: all 0.2s;
        }
        .form-control:focus { 
            border-color: var(--emerald); 
            box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.1); 
        }

        .current-asset {
            background-color: var(--slate-100);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--slate-200);
            margin-bottom: 10px;
        }

        
        .btn-update { 
            background-color: var(--emerald); 
            border: none; 
            color: white; 
            padding: 12px 30px; 
            font-weight: 700; 
            border-radius: 10px;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-update:hover { background-color: #064e3b; transform: translateY(-1px); color: white; }
        
        .btn-cancel { 
            background-color: transparent; 
            border: 2px solid var(--slate-200); 
            color: var(--slate-700); 
            padding: 12px 25px; 
            font-weight: 700; 
            border-radius: 10px; 
        }
        .btn-cancel:hover { background-color: var(--slate-100); }

        .thumbnail-preview {
            border-radius: 8px;
            border: 2px solid var(--slate-200);
            padding: 4px;
            background: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-graduation-cap me-2"></i>G.S GIHUNDWE</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/news"><i class="fas fa-newspaper me-1"></i> NEWS FEED</a>
                <a class="nav-link" href="/gallery"><i class="fas fa-images me-1"></i> GALLERY</a>
            </div>
        </div>
    </nav>

    <div class="school-header">
        <h1>Management Portal</h1>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card admin-card">
                    <div class="card-header-custom">
                        <h4><i class="fas fa-pen-nib me-2"></i>Update News Article</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/news/{id}/edit(id=${news.id})}" method="post" enctype="multipart/form-data">
                            
                            <div class="mb-4">
                                <label for="title" class="form-label">Article Title</label>
                                <input type="text" class="form-control shadow-sm" id="title" name="title" th:value="${news.title}" required placeholder="Enter a catchy title...">
                            </div>
                            
                            <div class="mb-4">
                                <label for="content" class="form-label">Article Content</label>
                                <textarea class="form-control shadow-sm" id="content" name="content" rows="10" required th:text="${news.content}" placeholder="Write your news story here..."></textarea>
                            </div>
                            
                            <hr class="my-4 opacity-50">

                            <div class="mb-4">
                                <label class="form-label">Document Attachment</label>
                                <div class="current-asset d-flex align-items-center mb-3" th:if="${news.documentName}">
                                    <i class="fas fa-file-alt text-emerald me-3 fa-lg"></i>
                                    <div>
                                        <div class="fw-bold small" th:text="${news.documentName}">filename.pdf</div>
                                        <div class="text-muted" style="font-size: 0.75rem;">Current file attached</div>
                                    </div>
                                </div>
                                <input type="file" class="form-control shadow-sm" id="document" name="document">
                                <div class="form-text">Select a PDF or Word doc to replace the existing one.</div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Featured Image</label>
                                <div class="mb-3" th:if="${news.imageName}">
                                    <div class="d-inline-block thumbnail-preview">
                                        <img th:src="@{'/uploads/news/' + ${news.imagePath}}" class="img-fluid" th:alt="${news.title}" style="max-height: 120px; border-radius: 4px;">
                                    </div>
                                </div>
                                <input type="file" class="form-control shadow-sm" id="image" name="image" accept="image/*">
                                <div class="form-text">High-quality landscape images work best.</div>
                            </div>
                            
                            <div class="d-flex gap-3 mt-5 pt-3 border-top">
                                <button type="submit" class="btn btn-update flex-grow-1">
                                    <i class="fas fa-cloud-upload-alt me-2"></i>SAVE CHANGES
                                </button>
                                <a th:href="@{/news/{id}(id=${news.id})}" class="btn btn-cancel">
                                    DISCARD
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
