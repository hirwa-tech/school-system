<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Note - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 80px 20px 40px;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .form-card {
            border: none;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            max-width: 850px;
            margin: 0 auto;
            background: white;
        }

        .form-header {
            background: linear-gradient(135deg, var(--emerald-dark) 0%, var(--emerald) 100%);
            padding: 2.5rem;
            text-align: center;
            color: white;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-900);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid var(--slate-200);
            background-color: #fcfcfd;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--emerald);
            box-shadow: 0 0 0 4px var(--emerald-light);
            background-color: white;
            outline: none;
        }

        .drop-zone {
            border: 2px dashed var(--slate-200);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fbfcfe;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--emerald);
            background: var(--emerald-light);
        }

        .drop-zone input[type="file"] { display: none; }

        .current-file-badge {
            background: var(--emerald-light);
            color: var(--emerald-dark);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            border: 1px solid #d1fae5;
        }

        .btn-save {
            background-color: var(--emerald);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-save:hover {
            background-color: var(--emerald-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(22, 101, 52, 0.2);
            color: white;
        }

        .btn-cancel {
            border-radius: 12px;
            padding: 16px 32px;
            font-weight: 700;
            color: var(--slate-700);
            background: #f1f5f9;
            border: none;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .icon-circle {
            width: 70px; 
            height: 70px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link fw-bold text-emerald" th:href="@{/notes/classroom/{id}(id=${classroomId})}">
                <i class="fas fa-times me-1"></i> Discard
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <div class="form-header">
            <div class="icon-circle">
                <i class="fas fa-edit text-emerald" style="font-size: 1.8rem;"></i>
            </div>
            <h2 class="fw-bold mb-1">Edit Note</h2>
            <p class="mb-0 opacity-75">Updating: <span th:text="${note.title}">Current Title</span></p>
        </div>

        <div class="card-body p-4 p-md-5">
            <form th:action="@{/notes/{id}/edit(id=${note.id})}" method="post" enctype="multipart/form-data" id="editForm">
                
                <div class="mb-4">
                    <label for="title" class="form-label">Note Title</label>
                    <input type="text" class="form-control" id="title" name="title" th:value="${note.title}" required>
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label">Note Content</label>
                    <textarea class="form-control" id="content" name="content" rows="10" 
                              th:text="${note.content}" placeholder="Edit your note details..."></textarea>
                </div>

                <div class="mb-5">
                    <label class="form-label">Update Attachment</label>
                    
                    <div th:if="${note.fileName != null}" class="mb-3">
                        <span class="current-file-badge">
                            <i class="fas fa-paperclip me-2"></i>
                            Currently: <strong class="ms-1" th:text="${note.fileName}">document.pdf</strong>
                        </span>
                    </div>

                    <div class="drop-zone" id="dropZone">
                        <i class="fas fa-file-upload mb-2 text-emerald fs-3"></i>
                        <h6 class="fw-bold text-slate-900 mb-0">Replace file or drag new one</h6>
                        <p class="text-muted small mb-0">Leave empty to keep existing file</p>
                        <input type="file" id="fileInput" name="file" accept=".pdf,.txt,.doc,.docx">
                    </div>
                    <div id="filePreview"></div>
                </div>

                <div class="row g-3">
                    <div class="col-md-8">
                        <button type="submit" class="btn btn-save w-100">
                            <i class="fas fa-check-circle me-2"></i>Save Changes
                        </button>
                    </div>
                    <div class="col-md-4">
                        <a th:href="@{/notes/classroom/{id}(id=${classroomId})}" class="btn btn-cancel w-100">
                            Cancel
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');

    dropZone.addEventListener('click', () => fileInput.click());

    ['dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, e => e.preventDefault());
    });

    dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

    dropZone.addEventListener('drop', (e) => {
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            updateFilePreview(files[0]);
        }
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) updateFilePreview(fileInput.files[0]);
    });

    function updateFilePreview(file) {
        const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
        filePreview.innerHTML = `
            <div class="mt-3 p-3 border rounded-3 bg-light d-flex justify-content-between align-items-center">
                <span class="small fw-bold text-emerald"><i class="fas fa-file-upload me-2"></i>New: ${file.name} (${sizeMB} MB)</span>
                <button type="button" class="btn btn-sm btn-outline-danger border-0" onclick="clearFile()"><i class="fas fa-times"></i></button>
            </div>`;
    }

    function clearFile() {
        fileInput.value = '';
        filePreview.innerHTML = '';
    }
</script>
</body>
</html>
