<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-top: 80px;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .page-header {
            background: white;
            padding: 2rem 0;
            border-bottom: 1px solid var(--slate-200);
            margin-bottom: 2rem;
        }

        .notes-card {
            border: 1px solid var(--slate-200);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .notes-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px -5px rgba(0,0,0,0.1);
            border-color: var(--emerald);
        }

        .notes-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            background: var(--emerald-light);
            color: var(--emerald);
        }

        .file-tag {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-download {
            background: var(--emerald-light);
            color: var(--emerald);
            border: 1px solid var(--emerald-light);
            font-weight: 700;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .btn-download:hover {
            background: var(--emerald);
            color: white;
        }

        .teacher-actions {
            border-top: 1px solid var(--slate-200);
            padding-top: 1rem;
            margin-top: auto;
        }

        .search-bar {
            border-radius: 50px;
            padding-left: 20px;
            border: 1px solid var(--slate-200);
            background: #f1f5f9;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link fw-bold text-emerald" th:href="@{/classroom/{id}(id=${classroom.id})}">
                <i class="fas fa-arrow-left me-1"></i> Classroom
            </a>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h2 class="fw-bold text-slate-900 mb-1">Learning Materials</h2>
                <p class="text-muted mb-0">Class: <span class="text-emerald fw-bold" th:text="${classroom.name}">Class Name</span></p>
            </div>
            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                <a th:if="${user.role == 'TEACHER'}" th:href="@{/notes/create/{id}(id=${classroom.id})}" class="btn btn-success px-4 rounded-pill fw-bold shadow-sm">
                    <i class="fas fa-plus-circle me-2"></i>Upload New Note
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container pb-5">
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="input-group shadow-sm" style="border-radius: 50px; overflow: hidden;">
                <span class="input-group-text bg-white border-0 ps-3"><i class="fas fa-search text-muted"></i></span>
                <input type="text" class="form-control border-0 py-2 search-bar" id="noteSearch" placeholder="Search notes by title...">
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(notes)}" class="text-center py-5 bg-white rounded-3 shadow-sm border">
        <div class="mb-3 text-emerald opacity-25">
            <i class="fas fa-folder-open" style="font-size: 5rem;"></i>
        </div>
        <h4 class="fw-bold text-slate-700">Shelf is empty!</h4>
        <p class="text-muted">No learning materials have been posted to this class yet.</p>
    </div>

    <div class="row g-4" id="notesGrid">
        <div th:each="note : ${notes}" class="col-md-6 col-lg-4 note-item">
            <div class="card notes-card p-4">
                <div class="d-flex align-items-center mb-3">
                    <div class="notes-icon">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <div class="ms-3">
                        <div th:if="${note.fileName}" class="file-tag bg-primary text-white mb-1 d-inline-block">Attachment</div>
                        <div th:unless="${note.fileName}" class="file-tag bg-warning text-dark mb-1 d-inline-block">Reading</div>
                    </div>
                </div>

                <h5 class="fw-bold text-slate-900 mb-1">
                    <a th:href="@{/notes/{id}(id=${note.id})}" th:text="${note.title}" class="text-decoration-none text-slate-900 note-title">Note Title</a>
                </h5>
                <p class="small text-muted mb-3">
                    <i class="far fa-clock me-1"></i> <span th:text="${#temporals.format(note.createdAt, 'MMM dd, yyyy')}">Date</span>
                </p>

                <div th:if="${note.content}" class="mb-4">
                    <p class="text-muted small mb-0" th:text="${#strings.abbreviate(note.content, 120)}">Preview of the note content goes here...</p>
                </div>

                <div class="mt-auto">
                    <a th:if="${note.fileName}" th:href="@{/notes/{id}/download(id=${note.id})}" class="btn btn-download w-100 mb-3">
                        <i class="fas fa-download me-2"></i>Download Resource
                    </a>

                    <div th:if="${user.role == 'TEACHER' && classroom.teacher.id == user.id}" class="teacher-actions d-flex justify-content-between">
                        <a th:href="@{/notes/{id}/edit(id=${note.id})}" class="btn btn-sm btn-link text-warning fw-bold text-decoration-none p-0">
                            <i class="fas fa-edit me-1"></i>Edit
                        </a>
                        <a th:href="@{/notes/{id}/delete(id=${note.id})}" class="btn btn-sm btn-link text-danger fw-bold text-decoration-none p-0" 
                            onclick="return confirm('Delete this note permanently?')">
                            <i class="fas fa-trash me-1"></i>Delete
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('noteSearch').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let items = document.querySelectorAll('.note-item');
        
        items.forEach(function(item) {
            let title = item.querySelector('.note-title').textContent.toLowerCase();
            if (title.indexOf(filter) > -1) {
                item.style.display = "";
            } else {
                item.style.display = "none";
            }
        });
    });
</script>

</body>
</html>
