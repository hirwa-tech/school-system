<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Note - G.S. GIHUNDWE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --emerald: #166534;
            --emerald-dark: #064e3b;
            --emerald-light: #ecfdf5;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-200: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 80px 20px 40px;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid var(--slate-200);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 800; color: var(--emerald) !important; }

        .form-card {
            border: none;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            max-width: 850px;
            margin: 0 auto;
            background: white;
        }

        .form-header {
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            padding: 2.5rem;
            text-align: center;
            color: white;
        }

        .form-label {
            font-weight: 700;
            color: var(--slate-900);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid var(--slate-200);
            background-color: #fcfcfd;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--emerald);
            box-shadow: 0 0 0 4px var(--emerald-light);
            background-color: white;
            outline: none;
        }

        .drop-zone {
            border: 2px dashed var(--slate-200);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fbfcfe;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--emerald);
            background: var(--emerald-light);
        }

        .drop-zone input[type="file"] { display: none; }

        .file-info {
            background: var(--emerald-light);
            color: var(--emerald-dark);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            border: 1px solid var(--emerald);
        }

        .btn-create {
            background-color: var(--emerald);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-create:hover {
            background-color: var(--emerald-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(22, 101, 52, 0.2);
            color: white;
        }

        .btn-cancel {
            border-radius: 12px;
            padding: 16px 32px;
            font-weight: 700;
            color: var(--slate-700);
            background: #f1f5f9;
            border: none;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-graduation-cap me-2"></i>G.S. GIHUNDWE</a>
        <div class="navbar-nav ms-auto align-items-center">
            <a class="nav-link fw-bold text-emerald me-3" th:href="@{/classroom/{id}(id=${classroomId})}">
                <i class="fas fa-arrow-left me-1"></i> Back to Class
            </a>
            <a class="btn btn-outline-danger btn-sm fw-bold rounded-pill px-3" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <div class="form-header">
            <div class="d-inline-flex align-items-center justify-content-center bg-white rounded-circle mb-3 shadow" style="width: 70px; height: 70px;">
                <i class="fas fa-file-signature text-emerald" style="font-size: 1.8rem;"></i>
            </div>
            <h2 class="fw-bold mb-1">Create Learning Note</h2>
            <p class="mb-0 opacity-75">Upload documents or write custom instructions for your students.</p>
        </div>

        <div class="card-body p-4 p-md-5">
            <form th:action="@{/notes/create/{id}(id=${classroomId})}" method="post" enctype="multipart/form-data" id="noteForm">
                
                <div class="mb-4">
                    <label for="title" class="form-label">Note Heading</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-heading text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="title" name="title" 
                               placeholder="e.g., Week 4: Quantum Mechanics Basics" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label">Content / Instructions</label>
                    <textarea class="form-control" id="content" name="content" rows="6" 
                              placeholder="Describe the material or write the full note here..."></textarea>
                </div>

                <div class="mb-5">
                    <label class="form-label">Attachment (Optional)</label>
                    <div class="drop-zone" id="dropZone">
                        <i class="fas fa-file-upload mb-3 text-muted" style="font-size: 2.5rem;"></i>
                        <h6 class="fw-bold text-slate-900">Click to upload or drag and drop</h6>
                        <p class="text-muted small mb-0">PDF, TXT, DOC or DOCX (Max 30MB)</p>
                        <input type="file" id="fileInput" name="file" accept=".pdf,.txt,.doc,.docx">
                    </div>
                    <div id="filePreview"></div>
                </div>

                <div class="row g-3">
                    <div class="col-md-8">
                        <button type="submit" class="btn btn-create w-100">
                            <i class="fas fa-paper-plane me-2"></i>Publish Note to Class
                        </button>
                    </div>
                    <div class="col-md-4">
                        <a th:href="@{/classroom/{id}(id=${classroomId})}" class="btn btn-cancel w-100">
                            Discard
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            updateFilePreview(files[0]);
        }
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            updateFilePreview(fileInput.files[0]);
        }
    });

    function updateFilePreview(file) {
        // Updated type checking to be more inclusive of modern DOCX types
        const validExtensions = ['pdf', 'txt', 'doc', 'docx'];
        const extension = file.name.split('.').pop().toLowerCase();
        
        if (!validExtensions.includes(extension)) {
            filePreview.innerHTML = '<div class="alert alert-danger mt-3 rounded-pill border-0 small"><i class="fas fa-exclamation-triangle me-2"></i>Invalid file type. Please use PDF, TXT, or DOC.</div>';
            fileInput.value = '';
            return;
        }
        
        const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
        filePreview.innerHTML = `
            <div class="file-info shadow-sm">
                <span><i class="fas fa-file-alt me-2"></i>${file.name} (${sizeMB} MB)</span>
                <button type="button" class="btn btn-sm btn-danger rounded-circle p-1" style="width: 24px; height: 24px; line-height: 1;" onclick="clearFile()">
                    <i class="fas fa-times"></i>
                </button>
            </div>`;
    }

    function clearFile() {
        fileInput.value = '';
        filePreview.innerHTML = '';
    }
</script>
</body>
</html>
